<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNWARE — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg:      #060608;
    --surface: #0d0d12;
    --border:  #1a1a24;
    --border2: #252533;
    --lime:    #b8ff3c;
    --cyan:    #3cffd4;
    --red:     #ff3c6e;
    --amber:   #ffb03c;
    --purple:  #9b6dff;
    --text:    #e8e8f0;
    --muted:   #5a5a72;
    --muted2:  #2a2a38;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ── LOGIN ── */
#login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 100;
}
.login-wrap { width: 340px; background: var(--surface); border: 1px solid var(--border2); overflow: hidden; }
.login-top { background: var(--lime); padding: 20px 28px 16px; display: flex; align-items: baseline; gap: 10px; }
.login-brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #000; letter-spacing: .06em; }
.login-tag { font-size: 10px; color: #333; letter-spacing: .15em; text-transform: uppercase; }
.scan-bar { height: 3px; background: var(--muted2); overflow: hidden; }
.scan-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--lime), var(--cyan)); transition: width 1.5s ease; }
.login-body { padding: 28px; }
.login-body p { color: var(--muted); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 20px; }
.login-body input {
    width: 100%; background: #080810; border: 1px solid var(--border2);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; padding: 11px 14px; outline: none; margin-bottom: 10px; transition: border-color .2s;
}
.login-body input:focus { border-color: var(--lime); }
.login-body button {
    width: 100%; background: var(--lime); color: #000; border: none;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px;
    letter-spacing: .1em; text-transform: uppercase; padding: 12px; cursor: pointer; transition: opacity .2s;
}
.login-body button:hover { opacity: .85; }
.login-err { color: var(--red); font-size: 10px; margin-top: 8px; min-height: 14px; }

/* ── DASHBOARD ── */
#dashboard { display: none; }

header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 48px; position: sticky; top: 0;
    background: var(--bg); z-index: 10;
}
.hbrand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: .08em; color: var(--lime); display: flex; align-items: center; gap: 10px; }
.live-pill { display: flex; align-items: center; gap: 5px; background: #0d1a04; border: 1px solid #2a4a0a; border-radius: 2px; padding: 3px 8px; font-size: 10px; letter-spacing: .1em; color: var(--lime); text-transform: uppercase; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--lime); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.hright { display: flex; align-items: center; gap: 12px; }
.htime { color: var(--muted); font-size: 11px; }
.range-select { background: var(--surface); border: 1px solid var(--border2); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 8px; outline: none; cursor: pointer; }
.refresh-btn { background: none; border: 1px solid var(--border2); color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 10px; cursor: pointer; transition: all .2s; }
.refresh-btn:hover { border-color: var(--lime); color: var(--lime); }

main { padding: 20px 24px; max-width: 1440px; margin: 0 auto; }

/* ── SECTION TITLE ── */
.section { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── STAT CARDS ── */
.stat-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 20px; }
.stat { background: var(--surface); padding: 16px 14px; position: relative; overflow: hidden; }
.stat::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--lime); opacity: 0; transition: opacity .3s; }
.stat:hover::before { opacity: 1; }
.stat-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.stat-val { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 26px; line-height: 1; color: var(--text); }
.stat-val.lime { color: var(--lime); }
.stat-val.cyan { color: var(--cyan); }
.stat-val.red  { color: var(--red); }
.stat-sub { font-size: 9px; color: var(--muted); margin-top: 6px; }

/* ── GRID LAYOUTS ── */
.row-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
.row-1-1 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.row-1-1-1 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.row-full { margin-bottom: 12px; }
.panel { background: var(--surface); border: 1px solid var(--border); padding: 18px; }

/* ── VISITOR FEED ── */
.vrow { display: grid; grid-template-columns: 8px 1fr auto; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); animation: fadeIn .4s ease; }
.vrow:last-child { border-bottom: none; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
.vdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.vdot.live { background: var(--lime); box-shadow: 0 0 6px var(--lime); animation: blink 1.4s infinite; }
.vdot.recent { background: var(--amber); }
.vdot.old { background: var(--muted2); }
.vinfo { min-width: 0; }
.vip { color: var(--text); font-size: 11px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.vmeta { color: var(--muted); font-size: 10px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vtime { color: var(--muted); font-size: 10px; white-space: nowrap; }

/* ── TAGS / BADGES ── */
.tag { display: inline-flex; align-items: center; gap: 3px; border-radius: 2px; padding: 1px 5px; font-size: 9px; font-family: 'JetBrains Mono', monospace; }
.tag.wifi { background: #041a18; color: var(--cyan); border: 1px solid #0a3330; }
.tag.cell { background: #1a0414; color: var(--red); border: 1px solid #330a1a; }
.tag.eth  { background: #1a1404; color: var(--amber); border: 1px solid #332800; }
.tag.neutral { background: var(--muted2); color: var(--muted); }

/* ── COUNTRY GRID ── */
.flag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.flag-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); }
.flag-emoji { font-size: 15px; flex-shrink: 0; }
.flag-country { color: var(--text); font-size: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.flag-count { color: var(--lime); font-size: 11px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin-left: auto; flex-shrink: 0; }
.flag-bar { height: 2px; background: var(--lime); margin-top: 3px; transition: width .6s cubic-bezier(.16,1,.3,1); }

/* ── BAR CHART ── */
.bar2 { display: flex; flex-direction: column; gap: 9px; }
.br { display: flex; align-items: center; gap: 10px; }
.bl { color: var(--muted); font-size: 10px; width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.bl.wide { width: 160px; }
.bt { flex: 1; height: 3px; background: var(--muted2); }
.bf { height: 100%; background: var(--lime); transition: width .8s cubic-bezier(.16,1,.3,1); }
.bf.c { background: var(--cyan); }
.bf.r { background: var(--red); }
.bf.a { background: var(--amber); }
.bc { width: 40px; text-align: right; color: var(--text); font-size: 10px; flex-shrink: 0; }

/* ── LINE CHART ── */
.line-wrap { position: relative; height: 140px; }
.line-wrap svg { width: 100%; height: 100%; overflow: visible; }

/* ── WEB VITALS ── */
.vitals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.vital { background: var(--bg); border: 1px solid var(--border); padding: 12px; text-align: center; }
.vital-name { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.vital-val { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; margin-bottom: 4px; }
.vital-val.g { color: var(--lime); }
.vital-val.o { color: var(--amber); }
.vital-val.r { color: var(--red); }
.vital-unit { font-size: 9px; color: var(--muted); }

/* ── DEVICES ── */
.device-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.dcard { background: var(--bg); border: 1px solid var(--border); padding: 12px; text-align: center; }
.dcard-icon { font-size: 18px; margin-bottom: 6px; }
.dcard-name { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
.dcard-val { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; }
.dcard-pct { font-size: 10px; color: var(--lime); margin-top: 2px; }

/* ── SCROLL FUNNEL ── */
.funnel { display: flex; gap: 6px; align-items: flex-end; height: 90px; margin-top: 4px; }
.fb { flex: 1; background: var(--lime); min-height: 4px; position: relative; transition: height .6s cubic-bezier(.16,1,.3,1); }
.fb.dim { opacity: .15; }
.fb-val { position: absolute; top: -17px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--lime); white-space: nowrap; }
.funnel-labels { display: flex; gap: 6px; margin-top: 6px; }
.funnel-labels span { flex: 1; text-align: center; font-size: 9px; color: var(--muted); }

/* ── HEATMAP ── */
.heatrow { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; margin: 4px 0; }
.hcell { height: 14px; border-radius: 2px; }
.heat-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-top: 4px; }

/* ── EVENT STREAM ── */
.event-stream { max-height: 220px; overflow-y: auto; }
.event-stream::-webkit-scrollbar { width: 3px; }
.event-stream::-webkit-scrollbar-thumb { background: var(--border2); }
.erow { display: grid; grid-template-columns: 64px 1fr 110px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); animation: fadeIn .3s ease; }
.erow:last-child { border-bottom: none; }
.etime { color: var(--muted); font-size: 10px; }
.ename { color: var(--lime); font-size: 10px; }
.epage { color: var(--muted); font-size: 10px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── RAGE CLICKS ── */
.rage-list { display: flex; flex-direction: column; gap: 6px; }
.ri { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--bg); border-left: 2px solid var(--red); }
.ri-page { color: var(--text); font-size: 10px; }
.ri-el { color: var(--muted); font-size: 9px; margin-top: 2px; }
.ri-count { color: var(--red); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; flex-shrink: 0; }

/* ── CONNECTION BREAKDOWN ── */
.conn-list { display: flex; flex-direction: column; gap: 8px; }
.conn-row { display: flex; align-items: center; gap: 10px; }
.conn-icon { font-size: 12px; width: 18px; text-align: center; flex-shrink: 0; }
.conn-label { color: var(--muted); font-size: 10px; width: 70px; flex-shrink: 0; }
.conn-bar { flex: 1; height: 3px; background: var(--muted2); }
.conn-fill { height: 100%; transition: width .8s cubic-bezier(.16,1,.3,1); }
.conn-count { color: var(--text); font-size: 10px; width: 40px; text-align: right; flex-shrink: 0; }

/* ── LOADING ── */
.loading { display: flex; align-items: center; justify-content: center; height: 180px; color: var(--muted); font-size: 11px; letter-spacing: .1em; }
.loading::before { content: ''; width: 14px; height: 14px; border: 1px solid var(--border2); border-top-color: var(--lime); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { color: var(--muted); font-size: 10px; padding: 20px 0; text-align: center; }

@media (max-width: 1100px) {
    .stat-grid { grid-template-columns: repeat(4, 1fr); }
    .row-2-1, .row-1-1-1 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
    main { padding: 12px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .row-2-1, .row-1-1, .row-1-1-1 { grid-template-columns: 1fr; }
    .vitals-grid, .device-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
    <div class="login-wrap">
        <div class="login-top">
            <div class="login-brand">UNWARE</div>
            <div class="login-tag">real-time tracker</div>
        </div>
        <div class="scan-bar"><div class="scan-bar-fill" id="scanbar"></div></div>
        <div class="login-body">
            <p>Authentification requise</p>
            <input type="password" id="pwd" placeholder="Secret d'accès" autocomplete="off">
            <button onclick="doLogin()">Accéder au dashboard →</button>
            <div class="login-err" id="lerr"></div>
        </div>
    </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
    <header>
        <div class="hbrand">
            UNWARE
            <div class="live-pill"><div class="live-dot"></div>LIVE</div>
        </div>
        <div class="hright">
            <div class="htime" id="clock">--:--:--</div>
            <select class="range-select" id="range-select" onchange="loadData()">
                <option value="1">24h</option>
                <option value="7" selected>7 jours</option>
                <option value="14">14 jours</option>
                <option value="30">30 jours</option>
                <option value="90">90 jours</option>
            </select>
            <button class="refresh-btn" onclick="loadData()">↺ refresh</button>
        </div>
    </header>
    <main>
        <div id="content"><div class="loading">Chargement des données</div></div>
    </main>
</div>

<script>
const API_URL = '/api/analytics-data';
let SECRET = '';
let autoRefresh;

// ── Login ──
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
setTimeout(() => { document.getElementById('scanbar').style.width = '100%'; }, 80);

function doLogin() {
    const v = document.getElementById('pwd').value.trim();
    if (!v) return;
    SECRET = v;
    loadData();
}

// ── Clock ──
function tick() {
    const el = document.getElementById('clock');
    if (el) el.textContent = new Date().toLocaleTimeString('fr-FR');
}
setInterval(tick, 1000); tick();

// ── Load ──
async function loadData() {
    clearInterval(autoRefresh);
    const range = document.getElementById('range-select')?.value || '7';
    document.getElementById('content').innerHTML = '<div class="loading">Chargement des données</div>';
    try {
        const res = await fetch(`${API_URL}?range=${range}`, {
            headers: { 'Authorization': `Bearer ${SECRET}` }
        });
        if (res.status === 401) {
            document.getElementById('lerr').textContent = 'Secret incorrect.';
            return;
        }
        const data = await res.json();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderDashboard(data);
        // Auto-refresh toutes les 30s
        autoRefresh = setInterval(async () => {
            try {
                const r2 = await fetch(`${API_URL}?range=${range}`, { headers: { 'Authorization': `Bearer ${SECRET}` } });
                if (r2.ok) renderDashboard(await r2.json());
            } catch(e) {}
        }, 30000);
    } catch(e) {
        document.getElementById('content').innerHTML = `<div class="empty">Erreur de connexion : ${e.message}</div>`;
    }
}

// ── Render ──
function renderDashboard(data) {
    const o   = data.overview     || {};
    const lv  = data.live_visitors || [];
    const cnt = data.countries    || [];
    const con = data.connections  || [];
    const pages  = data.top_pages  || [];
    const events = data.events     || [];
    const scroll = data.scroll     || [];
    const vitals = data.vitals     || [];
    const devices = data.devices   || [];
    const rages  = data.rage_clicks || [];
    const recent = data.recent     || [];
    const daily  = data.daily      || [];
    const timeOnPage = data.time_on_page || [];

    const totalDev = devices.reduce((s, d) => s + (+d.visitors), 0);
    const totalCon = con.reduce((s, c) => s + (+c.visitors), 0);
    const maxPages = Math.max(...pages.map(p => +p.views), 1);
    const maxEv    = Math.max(...events.map(e => +e.count), 1);
    const maxTop   = Math.max(...timeOnPage.map(t => +t.count), 1);
    const maxCnt   = cnt.length ? +cnt[0].visitors : 1;
    const maxCon   = con.length ? +con[0].visitors : 1;

    const vm = {};
    vitals.forEach(v => vm[v.event_name] = v);

    const scrollMap = {};
    scroll.forEach(s => scrollMap[s.event_name] = +s.count);
    const scrollSteps = ['scroll_25','scroll_50','scroll_75','scroll_90','scroll_100'];
    const scrollMax = Math.max(...scrollSteps.map(s => scrollMap[s] || 0), 1);

    // Heatmap simulée (à remplacer par vraie query si la colonne HOUR existe)
    const heatData = Array.from({length: 24}, (_, i) => ({ h: i, v: Math.floor(Math.random() * 80 + 10) }));
    const heatMax = Math.max(...heatData.map(d => d.v), 1);

    const html = `
        <!-- STATS OVERVIEW -->
        <div class="stat-grid">
            <div class="stat"><div class="stat-label">Visiteurs uniques</div><div class="stat-val lime">${fmt(o.unique_visitors)}</div><div class="stat-sub">période sélectionnée</div></div>
            <div class="stat"><div class="stat-label">Sessions</div><div class="stat-val">${fmt(o.total_sessions)}</div><div class="stat-sub">${ratio(o.pageviews, o.total_sessions)} pages / session</div></div>
            <div class="stat"><div class="stat-label">Pages vues</div><div class="stat-val cyan">${fmt(o.pageviews)}</div></div>
            <div class="stat"><div class="stat-label">Total events</div><div class="stat-val">${fmt(o.total_events)}</div></div>
            <div class="stat"><div class="stat-label">Live (5 min)</div><div class="stat-val lime">${lv.length}</div><div class="stat-sub">visiteurs actifs</div></div>
            <div class="stat"><div class="stat-label">Rage clicks</div><div class="stat-val ${+o.rage_clicks > 0 ? 'red' : ''}">${fmt(o.rage_clicks)}</div><div class="stat-sub">${+o.rage_clicks > 0 ? '⚠ friction' : '✓ aucun'}</div></div>
            <div class="stat"><div class="stat-label">Erreurs JS</div><div class="stat-val ${+o.js_errors > 0 ? 'red' : ''}">${fmt(o.js_errors)}</div><div class="stat-sub">${+o.js_errors > 0 ? '⚠ à corriger' : '✓ aucune'}</div></div>
        </div>

        <!-- ROW : LIVE VISITORS + PAYS -->
        <div class="row-2-1">
            <div class="panel">
                <div class="section">Visiteurs en temps réel <span style="font-size:9px;color:var(--lime)">● 5 dernières minutes</span></div>
                ${renderLiveVisitors(lv)}
            </div>
            <div class="panel">
                <div class="section">Pays d'origine</div>
                ${renderCountries(cnt, maxCnt)}
            </div>
        </div>

        <!-- ROW : COURBE + WEB VITALS -->
        <div class="row-1-1">
            <div class="panel">
                <div class="section">Visites par jour</div>
                <div class="line-wrap"><svg id="line-svg"></svg></div>
            </div>
            <div class="panel">
                <div class="section">Web Vitals</div>
                ${renderVitals(vm)}
                <div style="margin-top:14px">
                    <div class="section">Connexions réseau</div>
                    ${renderConnections(con, totalCon, maxCon)}
                </div>
            </div>
        </div>

        <!-- ROW : PAGES + EVENTS + DEVICES -->
        <div class="row-1-1-1">
            <div class="panel">
                <div class="section">Pages les plus visitées</div>
                ${renderBarChart(pages, 'page_title', 'views', 'wide')}
            </div>
            <div class="panel">
                <div class="section">Répartition events</div>
                ${renderBarChart(events, 'event_name', 'count', '', 'c')}
                <div style="margin-top:14px">
                    <div class="section">Temps sur la page</div>
                    ${renderBarChart(timeOnPage, 'event_name', 'count', '', 'a')}
                </div>
            </div>
            <div class="panel">
                <div class="section">Devices</div>
                ${renderDevices(devices, totalDev)}
                <div style="margin-top:14px">
                    <div class="section">Scroll funnel</div>
                    ${renderScrollFunnel(scrollSteps, scrollMap, scrollMax)}
                </div>
            </div>
        </div>

        <!-- ROW : HEATMAP + RAGE CLICKS -->
        <div class="row-1-1">
            <div class="panel">
                <div class="section">Heatmap d'activité (24h)</div>
                <div class="heatrow">
                    ${heatData.map(d => `<div class="hcell" style="background:rgba(184,255,60,${(d.v/heatMax)*.9})" title="${d.h}h : ${d.v}"></div>`).join('')}
                </div>
                <div class="heat-labels"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>
            </div>
            <div class="panel">
                <div class="section">Rage clicks</div>
                ${renderRageClicks(rages)}
            </div>
        </div>

        <!-- ROW : EVENT STREAM -->
        <div class="row-full">
            <div class="panel">
                <div class="section">Stream events récents</div>
                <div class="event-stream">
                    ${recent.length === 0 ? '<div class="empty">Aucun event récent</div>' :
                      recent.map(e => `
                        <div class="erow">
                            <div class="etime">${new Date(e.created_at).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
                            <div class="ename">${e.event_name}</div>
                            <div class="epage">${e.page_path || '—'}</div>
                        </div>`).join('')}
                </div>
            </div>
        </div>
    `;

    document.getElementById('content').innerHTML = html;
    renderLineChartSVG(daily);
}

// ── Live visitors ──
function renderLiveVisitors(lv) {
    if (!lv || lv.length === 0) return '<div class="empty">Aucun visiteur actif en ce moment</div>';
    const CONN_FLAGS = { wifi: ['wifi','▣ WiFi'], cellular: ['cell','▲ 4G/5G'], ethernet: ['eth','◈ Ethernet'] };
    const now = Date.now();
    return lv.map((v, i) => {
        const age = v.last_seen ? Math.floor((now - new Date(v.last_seen).getTime()) / 1000) : 999;
        const dotCls = age < 60 ? 'live' : age < 180 ? 'recent' : 'old';
        const timeStr = age < 10 ? 'maintenant' : age < 60 ? `il y a ${age}s` : `il y a ${Math.floor(age/60)}min`;
        const conn = (v.connection_type || '').toLowerCase();
        const [connCls, connLabel] = CONN_FLAGS[conn] || ['neutral', conn || '?'];
        const flag = countryFlag(v.country_code);
        return `<div class="vrow">
            <div class="vdot ${dotCls}"></div>
            <div class="vinfo">
                <div class="vip">
                    ${flag} <span style="color:var(--text)">${v.ip_address || '—'}</span>
                    <span class="tag ${connCls}">${connLabel}</span>
                </div>
                <div class="vmeta">${[v.city, v.country].filter(Boolean).join(' · ')} · ${v.os || ''} · ${v.browser || ''} · ${v.device_type || ''}</div>
            </div>
            <div class="vtime">${timeStr}</div>
        </div>`;
    }).join('');
}

// ── Countries ──
function renderCountries(cnt, maxCnt) {
    if (!cnt || cnt.length === 0) return '<div class="empty">Aucune donnée géo</div>';
    const total = cnt.reduce((s, c) => s + (+c.visitors), 0);
    return `<div class="flag-grid">${cnt.slice(0, 8).map(c => {
        const pct = total > 0 ? Math.round(+c.visitors / total * 100) : 0;
        const flag = countryFlag(c.country_code);
        return `<div class="flag-item">
            <span class="flag-emoji">${flag}</span>
            <div style="min-width:0;flex:1">
                <div class="flag-country">${c.country || 'Inconnu'}</div>
                <div class="flag-bar" style="width:${maxCnt>0?Math.round(+c.visitors/maxCnt*100):0}%"></div>
            </div>
            <div class="flag-count">${fmt(c.visitors)}</div>
        </div>`;
    }).join('')}</div>`;
}

// ── Connections ──
function renderConnections(con, total, maxCon) {
    if (!con || con.length === 0) return '<div class="empty">Aucune donnée réseau</div>';
    const MAP = { wifi:['▣','c'], cellular:['▲','r'], ethernet:['◈','a'], wifi_2g:['▣','c'], '4g':['▲','r'], '3g':['▲','r'] };
    return `<div class="conn-list">${con.map(c => {
        const key = (c.connection_type || '').toLowerCase();
        const [icon, colorCls] = MAP[key] || ['?', ''];
        const pct = total > 0 ? Math.round(+c.visitors / total * 100) : 0;
        return `<div class="conn-row">
            <div class="conn-icon">${icon}</div>
            <div class="conn-label">${c.connection_type || '?'}</div>
            <div class="conn-bar"><div class="conn-fill bf ${colorCls}" style="width:${maxCon>0?Math.round(+c.visitors/maxCon*100):0}%"></div></div>
            <div class="conn-count">${fmt(c.visitors)} <span style="color:var(--muted)">(${pct}%)</span></div>
        </div>`;
    }).join('')}</div>`;
}

// ── Bar chart ──
function renderBarChart(rows, labelKey, countKey, labelCls = '', color = '') {
    if (!rows || rows.length === 0) return '<div class="empty">Aucune donnée</div>';
    const max = Math.max(...rows.map(r => +r[countKey]), 1);
    return `<div class="bar2">${rows.slice(0, 8).map(r => `
        <div class="br">
            <div class="bl ${labelCls}">${r[labelKey] || '—'}</div>
            <div class="bt"><div class="bf ${color}" style="width:${Math.round(+r[countKey]/max*100)}%"></div></div>
            <div class="bc">${fmt(r[countKey])}</div>
        </div>`).join('')}</div>`;
}

// ── Vitals ──
function renderVitals(vm) {
    const defs = [
        { key:'vital_lcp',  label:'LCP',  unit:'ms', good:2500, ok:4000 },
        { key:'vital_fcp',  label:'FCP',  unit:'ms', good:1800, ok:3000 },
        { key:'vital_ttfb', label:'TTFB', unit:'ms', good:800,  ok:1800 },
        { key:'vital_inp',  label:'INP',  unit:'ms', good:200,  ok:500  },
    ];
    return `<div class="vitals-grid">${defs.map(m => {
        const v = vm[m.key];
        const avg = v ? Math.round(v.avg_ms) : null;
        const cls = avg === null ? '' : avg <= m.good ? 'g' : avg <= m.ok ? 'o' : 'r';
        return `<div class="vital">
            <div class="vital-name">${m.label}</div>
            <div class="vital-val ${cls}">${avg !== null ? avg : '—'}</div>
            <div class="vital-unit">${avg !== null ? m.unit + ' · ' + v.samples + ' samples' : 'pas de données'}</div>
        </div>`;
    }).join('')}</div>`;
}

// ── Devices ──
function renderDevices(devices, total) {
    if (!devices || devices.length === 0) return '<div class="empty">Aucune donnée</div>';
    const icons = { desktop:'🖥', mobile:'📱', tablet:'⬛' };
    return `<div class="device-grid">${devices.map(d => {
        const pct = total > 0 ? Math.round(+d.visitors / total * 100) : 0;
        return `<div class="dcard">
            <div class="dcard-icon">${icons[d.device_type] || '?'}</div>
            <div class="dcard-name">${d.device_type || '?'}</div>
            <div class="dcard-val">${fmt(d.visitors)}</div>
            <div class="dcard-pct">${pct}%</div>
        </div>`;
    }).join('')}</div>`;
}

// ── Scroll funnel ──
function renderScrollFunnel(steps, map, max) {
    const labels = ['25%','50%','75%','90%','100%'];
    return `
        <div class="funnel">
            ${steps.map((s, i) => {
                const v = map[s] || 0;
                const h = max > 0 ? Math.round(v / max * 100) : 0;
                return `<div class="fb ${v > 0 ? '' : 'dim'}" style="height:${h}%">
                    ${v > 0 ? `<div class="fb-val">${fmt(v)}</div>` : ''}
                </div>`;
            }).join('')}
        </div>
        <div class="funnel-labels">${labels.map(l => `<span>${l}</span>`).join('')}</div>`;
}

// ── Rage clicks ──
function renderRageClicks(rages) {
    if (!rages || rages.length === 0) return '<div class="empty" style="color:var(--lime)">✓ Aucun rage click détecté</div>';
    return `<div class="rage-list">${rages.map(r => `
        <div class="ri">
            <div>
                <div class="ri-page">${r.page_path || '—'}</div>
                <div class="ri-el">${r.element || '—'}</div>
            </div>
            <div class="ri-count">${r.count}×</div>
        </div>`).join('')}</div>`;
}

// ── Line chart SVG ──
function renderLineChartSVG(daily) {
    const svg = document.getElementById('line-svg');
    if (!svg || !daily || daily.length === 0) {
        if (svg) svg.innerHTML = `<text x="50%" y="50%" fill="#5a5a72" text-anchor="middle" font-size="11">Aucune donnée</text>`;
        return;
    }
    const W = svg.clientWidth || 460, H = 140;
    const pad = { t: 20, r: 16, b: 32, l: 40 };
    const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
    const maxV = Math.max(...daily.map(d => +d.pageviews), 1);
    const xS = i => pad.l + (i / (daily.length - 1 || 1)) * cW;
    const yS = (v, max) => pad.t + cH - (v / max) * cH;
    const pvPts = daily.map((d, i) => `${xS(i)},${yS(+d.pageviews, maxV)}`).join(' ');
    const uvPts = daily.map((d, i) => `${xS(i)},${yS(+d.visitors, maxV)}`).join(' ');
    const pvArea = `${pad.l},${pad.t+cH} ${pvPts} ${xS(daily.length-1)},${pad.t+cH}`;
    const uvArea = `${pad.l},${pad.t+cH} ${uvPts} ${xS(daily.length-1)},${pad.t+cH}`;
    svg.innerHTML = `
        <defs>
            <linearGradient id="gPV" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#b8ff3c" stop-opacity=".25"/>
                <stop offset="100%" stop-color="#b8ff3c" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gUV" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3cffd4" stop-opacity=".15"/>
                <stop offset="100%" stop-color="#3cffd4" stop-opacity="0"/>
            </linearGradient>
        </defs>
        <polygon points="${pvArea}" fill="url(#gPV)"/>
        <polygon points="${uvArea}" fill="url(#gUV)"/>
        <polyline points="${pvPts}" fill="none" stroke="#b8ff3c" stroke-width="1.5"/>
        <polyline points="${uvPts}" fill="none" stroke="#3cffd4" stroke-width="1.5" stroke-dasharray="4,3"/>
        ${daily.map((d, i) => `
            <circle cx="${xS(i)}" cy="${yS(+d.pageviews, maxV)}" r="2.5" fill="#b8ff3c"/>
            <text x="${xS(i)}" y="${H-8}" text-anchor="middle" fill="#5a5a72" font-size="9" font-family="JetBrains Mono,monospace">
                ${new Date(d.day).toLocaleDateString('fr',{day:'2-digit',month:'2-digit'})}
            </text>`).join('')}
        <text x="8" y="${pad.t}" fill="#5a5a72" font-size="9" font-family="JetBrains Mono,monospace">${maxV}</text>
        <text x="8" y="${pad.t+cH}" fill="#5a5a72" font-size="9" font-family="JetBrains Mono,monospace">0</text>
        <rect x="${pad.l}" y="${H-5}" width="10" height="2" fill="#b8ff3c"/>
        <text x="${pad.l+14}" y="${H-1}" fill="#888" font-size="9" font-family="JetBrains Mono,monospace">pages vues</text>
        <rect x="${pad.l+80}" y="${H-5}" width="10" height="2" fill="#3cffd4"/>
        <text x="${pad.l+94}" y="${H-1}" fill="#888" font-size="9" font-family="JetBrains Mono,monospace">visiteurs</text>
    `;
}

// ── Country flag emoji from country code ──
function countryFlag(code) {
    if (!code || code.length !== 2) return '🌐';
    const offset = 127397;
    return String.fromCodePoint(...code.toUpperCase().split('').map(c => c.charCodeAt(0) + offset));
}

// ── Utils ──
function fmt(n) { return n == null ? '0' : Number(n).toLocaleString('fr'); }
function ratio(a, b) { return +b > 0 ? (+a / +b).toFixed(1) : '0'; }
</script>
