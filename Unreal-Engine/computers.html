<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDINATEUR - Système Interactif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            padding: 20px;
        }
        
        .computer-panel {
            width: 420px;
            height: 85vh;
            max-height: 700px;
            background-color: #ffffff;
            border: 2px solid #000000;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            padding: 20px;
            border-bottom: 2px solid #000000;
            text-align: center;
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #000000;
        }
        
        .header p {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        
        /* ÉCRAN / TERMINAL */
        .screen {
            margin: 20px;
            background-color: #fafafa;
            border: 1px solid #ddd;
            min-height: 180px;
            padding: 15px;
            font-family: 'Courier New', monospace;
        }
        
        .screen-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #aaa;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        
        .terminal-content {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #000;
            line-height: 1.5;
            word-break: break-word;
            min-height: 120px;
        }
        
        .terminal-line {
            margin: 4px 0;
        }
        
        .prompt {
            color: #000;
            font-weight: bold;
        }
        
        /* COMPOSANTS SYSTÈME */
        .components-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }
        
        .component-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #ddd;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .component-item:hover:not(.active):not(.blocked) {
            background-color: #f8f8f8;
        }
        
        .component-item:last-child {
            border-bottom: none;
        }
        
        .component-item.active {
            background-color: #000000;
            color: #ffffff;
        }
        
        .component-item.blocked {
            cursor: not-allowed;
            background-color: #f5f5f5;
            opacity: 0.5;
        }
        
        .component-name {
            font-size: 20px;
            font-weight: 300;
            color: #000000;
        }
        
        .component-item.active .component-name {
            color: #ffffff;
        }
        
        .component-label {
            font-size: 12px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666666;
        }
        
        .component-item.active .component-label {
            color: #ffffff;
        }
        
        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            background-color: #eee;
            border-radius: 20px;
            color: #333;
        }
        
        .component-item.active .status-badge {
            background-color: #333;
            color: #fff;
        }
        
        /* STATUT SYSTÈME */
        .system-status {
            padding: 20px;
            border-top: 2px solid #000000;
            border-bottom: 2px solid #000000;
            text-align: center;
            background-color: #fafafa;
        }
        
        .system-status h2 {
            font-size: 11px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666666;
            margin-bottom: 8px;
        }
        
        .status-value {
            font-size: 24px;
            font-weight: 300;
            color: #000000;
        }
        
        /* BOUTON DÉMARRAGE */
        .boot-section {
            padding: 20px;
            border-top: 2px solid #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .boot-section:hover {
            background-color: #f8f8f8;
        }
        
        .boot-label {
            font-size: 16px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #000000;
        }
        
        .boot-icon {
            font-size: 20px;
            color: #000000;
        }
        
        /* Animations */
        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 0.7; }
            100% { opacity: 0.4; }
        }
        
        .blinking {
            animation: blink 2s ease-in-out infinite;
        }
        
        @keyframes clickEffect {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); }
            100% { transform: scale(1); }
        }
        
        .clicking {
            animation: clickEffect 0.2s ease;
        }
        
        /* Scrollbar discrète */
        .components-list::-webkit-scrollbar {
            width: 4px;
        }
        
        .components-list::-webkit-scrollbar-track {
            background: #f0f0f0;
        }
        
        .components-list::-webkit-scrollbar-thumb {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="computer-panel">
        <div class="header">
            <h1>ORDINATEUR</h1>
            <p>SYSTÈME INTERACTIF</p>
        </div>
        
        <!-- ÉCRAN / CONSOLE -->
        <div class="screen">
            <div class="screen-title">[ CONSOLE PRINCIPALE ]</div>
            <div class="terminal-content" id="terminal">
                <div class="terminal-line">> SYSTÈME EN ATTENTE</div>
                <div class="terminal-line">> ACTIVEZ LES COMPOSANTS</div>
            </div>
        </div>
        
        <!-- COMPOSANTS DU PC -->
        <div class="components-list">
            <div class="component-item active" data-component="power">
                <div class="component-name">⚡</div>
                <div class="component-label">Alimentation</div>
                <span class="status-badge">ACTIF</span>
            </div>
            
            <div class="component-item blocked blinking" data-component="cpu">
                <div class="component-name">⎚</div>
                <div class="component-label">Processeur</div>
                <span class="status-badge">INACTIF</span>
            </div>
            
            <div class="component-item blocked blinking" data-component="ram">
                <div class="component-name">▮▮</div>
                <div class="component-label">Mémoire RAM</div>
                <span class="status-badge">INACTIF</span>
            </div>
            
            <div class="component-item blocked blinking" data-component="stockage">
                <div class="component-name">⌽</div>
                <div class="component-label">Stockage SSD</div>
                <span class="status-badge">INACTIF</span>
            </div>
            
            <div class="component-item blocked blinking" data-component="os">
                <div class="component-name">◉</div>
                <div class="component-label">Système d'exploitation</div>
                <span class="status-badge">INACTIF</span>
            </div>
        </div>
        
        <!-- STATUT GÉNÉRAL -->
        <div class="system-status">
            <h2>État du système</h2>
            <div class="status-value" id="systemStatus">DÉMARRAGE REQUIS</div>
        </div>
        
        <!-- BOUTON DE DÉMARRAGE -->
        <div class="boot-section" id="bootBtn">
            <div class="boot-label">DÉMARRER LE PC</div>
            <div class="boot-icon">⏻</div>
        </div>
    </div>

    <script>
        // État des composants
        const components = {
            power: { active: true, label: "Alimentation" },
            cpu: { active: false, label: "Processeur" },
            ram: { active: false, label: "Mémoire RAM" },
            stockage: { active: false, label: "Stockage SSD" },
            os: { active: false, label: "Système d'exploitation" }
        };
        
        let isBooting = false;
        let bootTimeout = null;
        
        const terminal = document.getElementById('terminal');
        const systemStatusDiv = document.getElementById('systemStatus');
        const bootBtn = document.getElementById('bootBtn');
        
        function addTerminalLine(text, isError = false) {
            const line = document.createElement('div');
            line.className = 'terminal-line';
            line.style.color = isError ? '#c00' : '#000';
            line.innerHTML = `> ${text}`;
            terminal.appendChild(line);
            // Scroll
            terminal.parentElement.scrollTop = terminal.scrollHeight;
            // Garder un historique raisonnable
            while (terminal.children.length > 15) {
                terminal.removeChild(terminal.firstChild);
            }
        }
        
        function updateUI() {
            // Mettre à jour l'affichage des composants
            for (const [key, comp] of Object.entries(components)) {
                const element = document.querySelector(`[data-component="${key}"]`);
                if (element) {
                    const badge = element.querySelector('.status-badge');
                    if (comp.active) {
                        element.classList.remove('blocked', 'blinking');
                        element.classList.add('active');
                        if (badge) badge.textContent = 'ACTIF';
                    } else {
                        element.classList.remove('active');
                        element.classList.add('blocked', 'blinking');
                        if (badge) badge.textContent = 'INACTIF';
                    }
                }
            }
            
            // Vérifier si tout est actif
            const allActive = Object.values(components).every(c => c.active === true);
            if (allActive) {
                systemStatusDiv.textContent = 'SYSTÈME COMPLET ✅';
                systemStatusDiv.style.color = '#000';
                bootBtn.style.opacity = '0.6';
                bootBtn.style.cursor = 'default';
                addTerminalLine('ORDINATEUR PRÊT - TOUS LES COMPOSANTS SONT ACTIFS');
            } else {
                const activeCount = Object.values(components).filter(c => c.active).length;
                const total = Object.keys(components).length;
                systemStatusDiv.textContent = `BOOT: ${Math.floor((activeCount/total)*100)}%`;
            }
        }
        
        function activateComponent(componentKey, delay = 0) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    if (!components[componentKey].active) {
                        components[componentKey].active = true;
                        addTerminalLine(`${components[componentKey].label} activé ✓`);
                        updateUI();
                    }
                    resolve();
                }, delay);
            });
        }
        
        async function startFullBoot() {
            if (isBooting) return;
            
            // Vérifier si déjà tout actif
            const allActive = Object.values(components).every(c => c.active);
            if (allActive) {
                addTerminalLine("Système déjà opérationnel", false);
                return;
            }
            
            isBooting = true;
            bootBtn.style.opacity = '0.5';
            bootBtn.style.cursor = 'wait';
            
            // Nettoyer le terminal
            terminal.innerHTML = '';
            addTerminalLine("=== DÉMARRAGE DU SYSTÈME ===");
            addTerminalLine("Vérification des composants...");
            
            // Séquence d'activation
            if (!components.cpu.active) {
                await activateComponent('cpu', 800);
            }
            if (!components.ram.active) {
                await activateComponent('ram', 600);
            }
            if (!components.stockage.active) {
                await activateComponent('stockage', 600);
            }
            if (!components.os.active) {
                await activateComponent('os', 1000);
            }
            
            addTerminalLine("=== SYSTÈME OPÉRATIONNEL ===");
            addTerminalLine("Prêt à exécuter des programmes.");
            
            isBooting = false;
            bootBtn.style.opacity = '1';
            bootBtn.style.cursor = 'pointer';
            updateUI();
        }
        
        // Activation manuelle par clic sur un composant
        document.querySelectorAll('.component-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const compKey = item.getAttribute('data-component');
                if (compKey && !components[compKey].active && !isBooting) {
                    // Effet clic
                    item.classList.add('clicking');
                    setTimeout(() => item.classList.remove('clicking'), 200);
                    activateComponent(compKey, 0);
                } else if (compKey && components[compKey].active) {
                    addTerminalLine(`${components[compKey].label} déjà actif`, false);
                } else if (isBooting) {
                    addTerminalLine("Démarrage en cours, veuillez patienter...", true);
                }
            });
        });
        
        // Bouton de démarrage
        bootBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            bootBtn.classList.add('clicking');
            setTimeout(() => bootBtn.classList.remove('clicking'), 200);
            startFullBoot();
        });
        
        // Initialisation
        updateUI();
        addTerminalLine("CLIQUEZ SUR 'DÉMARRER LE PC' ou activez les composants manuellement");
    </script>
</body>
</html>
